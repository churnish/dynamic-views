name: Tests

on:
  push:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.gitignore'
      - 'LICENSE'
      - 'archive/**'
      - 'docs/**'
      - 'knowledge/**'
      - 'version-bump.mjs'
      - 'wiki/**'
  pull_request:
    branches: ['**']
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.gitignore'
      - 'LICENSE'
      - 'archive/**'
      - 'docs/**'
      - 'knowledge/**'
      - 'version-bump.mjs'
      - 'wiki/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install

      - run: npm test

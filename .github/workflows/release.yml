name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Commit all changes to repo
        run: |
          git config user.name "churnish"
          git config user.email "183069544+churnish@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "build: Update repository for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, skipping release notes."
            echo "BODY=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          SINCE=$(TZ=UTC0 git log -1 --format='%ad' --date=iso-strict-local "$PREV_TAG" | sed 's/+00:00$/Z/')

          PRS=$(gh pr list --state merged --search "merged:>=${SINCE}" --limit 200 \
            --json number,title,author \
            --jq '.[] | "- \(.title) #\(.number) by @\(.author.login)"')

          ISSUES=$(gh issue list --state closed --limit 200 \
            --json number,title,closedAt,stateReason \
            --jq "[.[] | select(.stateReason == \"COMPLETED\" and .closedAt >= \"${SINCE}\")] | .[] | \"- \(.title) #\(.number)\"")

          BODY=""
          if [ -n "$PRS" ]; then
            printf -v BODY '### Merged PRs\n\n%s' "$PRS"
          fi
          if [ -n "$ISSUES" ]; then
            if [ -n "$BODY" ]; then
              printf -v BODY '%s\n\n### Closed issues\n\n%s' "$BODY" "$ISSUES"
            else
              printf -v BODY '### Closed issues\n\n%s' "$ISSUES"
            fi
          fi

          {
            echo 'BODY<<EOF'
            echo "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release bundle
        run: |
          REPO=${GITHUB_REPOSITORY##*/}
          FILES="main.js manifest.json"
          [ -f styles.css ] && FILES="$FILES styles.css"
          zip "$REPO.zip" $FILES

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            ${{ github.event.repository.name }}.zip
          body: ${{ steps.notes.outputs.BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync wiki
        run: |
          if [ -d "wiki" ]; then
            git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git /tmp/wiki
            find /tmp/wiki -maxdepth 1 -name "*.md" -delete
            cp wiki/*.md /tmp/wiki/
            rm -f /tmp/wiki/wiki-structure.md
            cd /tmp/wiki
            git config user.name "churnish"
            git config user.email "183069544+churnish@users.noreply.github.com"
            git add -A
            git diff --staged --quiet || git commit -m "Sync wiki for ${GITHUB_REF_NAME}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
